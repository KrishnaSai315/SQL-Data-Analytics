<svg width="100%" viewBox="0 0 780 480" xmlns="http://www.w3.org/2000/svg" role="img">
<title>SQL Data Analytics Architecture</title>
<desc>Three-tier analytics architecture: Exploratory Data Analysis, core Data Analytics hub, and Advanced Analytics.</desc>

<defs>
  <marker id="ma" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="mb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ─── Background ─────────────────────────────────── -->
<rect width="780" height="480" fill="#ffffff" rx="12"/>
<rect width="780" height="480" fill="none" rx="12" stroke="#e2e0d6" stroke-width="1"/>

<!-- ─── Column dividers ────────────────────────────── -->
<line x1="260" y1="20" x2="260" y2="460" stroke="#e2e0d6" stroke-width="0.5" stroke-dasharray="4 4"/>
<line x1="520" y1="20" x2="520" y2="460" stroke="#e2e0d6" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- ─── Column headers ─────────────────────────────── -->
<rect x="30" y="18" width="200" height="34" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="130" y="30" text-anchor="middle" font-family="monospace,sans-serif" font-size="11" font-weight="600" fill="#085041" dominant-baseline="hanging">Exploratory</text>
<text x="130" y="43" text-anchor="middle" font-family="monospace,sans-serif" font-size="10" fill="#0F6E56" dominant-baseline="hanging">Data Analysis (EDA)</text>

<rect x="290" y="18" width="200" height="34" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="390" y="30" text-anchor="middle" font-family="monospace,sans-serif" font-size="11" font-weight="600" fill="#3C3489" dominant-baseline="hanging">Data Analytics Hub</text>
<text x="390" y="43" text-anchor="middle" font-family="monospace,sans-serif" font-size="10" fill="#534AB7" dominant-baseline="hanging">3 Domains + Tech Stack</text>

<rect x="550" y="18" width="200" height="34" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="650" y="30" text-anchor="middle" font-family="monospace,sans-serif" font-size="11" font-weight="600" fill="#633806" dominant-baseline="hanging">Advanced</text>
<text x="650" y="43" text-anchor="middle" font-family="monospace,sans-serif" font-size="10" fill="#854F0B" dominant-baseline="hanging">Analytics</text>

<!-- ─── Arrows between columns ────────────────────── -->
<line x1="231" y1="260" x2="287" y2="260" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#ma)"/>
<line x1="493" y1="260" x2="547" y2="260" stroke="#854F0B" stroke-width="1.2" marker-end="url(#mb)"/>

<!-- Animated particle EDA → Hub -->
<circle r="4" fill="#1D9E75" opacity="0">
  <animateMotion dur="2s" repeatCount="indefinite" path="M231,260 L287,260"/>
  <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.92;1" dur="2s" repeatCount="indefinite"/>
</circle>

<!-- Animated particle Hub → Advanced -->
<circle r="4" fill="#BA7517" opacity="0">
  <animateMotion dur="2s" repeatCount="indefinite" begin="1s" path="M493,260 L547,260"/>
  <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.92;1" dur="2s" repeatCount="indefinite" begin="1s"/>
</circle>

<!-- ─── Hub pulse rings ────────────────────────────── -->
<circle cx="390" cy="260" r="40" fill="none" stroke="#534AB7" stroke-width="0.5">
  <animate attributeName="r" values="40;80" dur="2.5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.5;0" dur="2.5s" repeatCount="indefinite"/>
</circle>
<circle cx="390" cy="260" r="40" fill="none" stroke="#534AB7" stroke-width="0.5">
  <animate attributeName="r" values="40;80" dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.5;0" dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
</circle>

